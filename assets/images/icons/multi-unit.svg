<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#1B2A6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Building outline -->
  <rect x="8" y="8" width="32" height="34" rx="1"/>
  <!-- Floor dividers -->
  <line x1="8" y1="20" x2="40" y2="20"/>
  <line x1="8" y1="31" x2="40" y2="31"/>
  <!-- Top row windows -->
  <rect x="13" y="12" width="6" height="5" rx="0.5"/>
  <rect x="29" y="12" width="6" height="5" rx="0.5"/>
  <!-- Middle row windows -->
  <rect x="13" y="23" width="6" height="5" rx="0.5"/>
  <rect x="29" y="23" width="6" height="5" rx="0.5"/>
  <!-- Door -->
  <rect x="19" y="34" width="10" height="8" rx="0.5"/>
  <!-- Yellow accent -->
  <rect x="13" y="12" width="6" height="5" rx="0.5" fill="#F2BE22" stroke="none" opacity="0.5"/>
  <rect x="29" y="23" width="6" height="5" rx="0.5" fill="#F2BE22" stroke="none" opacity="0.5"/>
</svg>
