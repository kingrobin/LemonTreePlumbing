<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Inter, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px; }
  .row { display: flex; gap: 32px; }
  .item { background: white; border-radius: 12px; padding: 24px; text-align: center; width: 160px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  img { width: 64px; height: 64px; }
  p { margin: 12px 0 0; font-size: 13px; font-weight: 600; color: #1B2A6B; line-height: 1.4; }

  /* Dark bg version */
  .dark { background: #1B2A6B; }
  .dark p { color: white; }

  .row2 { margin-top: 24px; }
</style>
</head>
<body>
<div>
  <div class="row">
    <div class="item">
      <img src="single-family.svg">
      <p>Single-Family Homes & Bungalows</p>
    </div>
    <div class="item">
      <img src="multi-unit.svg">
      <p>Multi-Unit & Rental Properties</p>
    </div>
    <div class="item">
      <img src="small-office.svg">
      <p>Small Offices & Shops</p>
    </div>
  </div>
  <div class="row row2">
    <div class="item dark">
      <img src="single-family.svg">
      <p>Single-Family Homes & Bungalows</p>
    </div>
    <div class="item dark">
      <img src="multi-unit.svg">
      <p>Multi-Unit & Rental Properties</p>
    </div>
    <div class="item dark">
      <img src="small-office.svg">
      <p>Small Offices & Shops</p>
    </div>
  </div>
</div>
</body>
</html>
